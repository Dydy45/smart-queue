<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#570df8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Ticket icon -->
  <g transform="translate(96, 80) scale(0.625)" fill="none" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <rect x="32" y="32" width="448" height="500" rx="32"/>
    <line x1="128" y1="160" x2="384" y2="160"/>
    <line x1="128" y1="256" x2="320" y2="256"/>
    <line x1="128" y1="352" x2="256" y2="352"/>
    <!-- Queue dots -->
    <circle cx="80" cy="160" r="12" fill="white" stroke="none"/>
    <circle cx="80" cy="256" r="12" fill="white" stroke="none"/>
    <circle cx="80" cy="352" r="12" fill="white" stroke="none"/>
  </g>
  <!-- SQ text -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="72" fill="white" opacity="0.9">SQ</text>
</svg>
